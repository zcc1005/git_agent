<section
  class="agent-chat"
  data-agent-chat
  data-mode="agent"
  data-endpoint="/api/agent/chat"
  data-history-endpoint="/api/agent/history"
  data-monitoring-start-endpoint="/api/agent/monitoring/start"
  data-monitoring-stop-endpoint="/api/agent/monitoring/stop"
  data-monitoring-status-endpoint="/api/agent/monitoring/status"
  data-monitoring-events-endpoint="/api/agent/monitoring/events"
  data-realtime-stop-endpoint="/api/agent/realtime-inspection/stop"
  data-realtime-status-endpoint="/api/agent/realtime-inspection/status"
  data-realtime-events-endpoint="/api/agent/realtime-inspection/events"
  aria-label="智能巡检助手"
>
  <section class="agent-chat__realtime-card is-collapsed" data-agent-realtime-card aria-live="polite">
    <button class="agent-chat__realtime-summary" type="button" data-agent-realtime-toggle aria-expanded="false">
      <span class="agent-chat__realtime-dot" data-agent-realtime-dot></span>
      <strong data-agent-realtime-title>实时巡检：暂无运行任务</strong>
      <span data-agent-realtime-summary>启动后可在这里查看状态和事件</span>
      <em data-agent-realtime-unread hidden>0</em>
      <span class="agent-chat__realtime-chevron" aria-hidden="true">⌄</span>
    </button>
    <div class="agent-chat__realtime-detail" data-agent-realtime-detail hidden>
      <div class="agent-chat__realtime-metrics">
        <div><span>运行状态</span><strong data-agent-realtime-status>未启动</strong></div>
        <div><span>运行时长</span><strong data-agent-realtime-duration>—</strong></div>
        <div><span>读取帧数</span><strong data-agent-realtime-frames-read>0</strong></div>
        <div><span>推理帧数</span><strong data-agent-realtime-frames-inferred>0</strong></div>
        <div><span>事件数</span><strong data-agent-realtime-event-count>0</strong></div>
        <div><span>待处理报警</span><strong data-agent-realtime-pending-count>0</strong></div>
        <div><span>最高风险</span><strong data-agent-realtime-risk>无风险</strong></div>
        <div><span>最近事件</span><strong data-agent-realtime-latest>暂无</strong></div>
      </div>
      <div class="agent-chat__realtime-events-head">
        <strong>实时事件中心</strong>
        <div>
          <button type="button" data-agent-realtime-confirm hidden>确认待处理报警</button>
          <button type="button" data-agent-realtime-cancel hidden>取消待处理报警</button>
          <button type="button" data-agent-realtime-stop hidden>停止任务</button>
        </div>
      </div>
      <div class="agent-chat__realtime-events" data-agent-realtime-events>
        <p class="agent-chat__realtime-empty">当前没有确认异物事件。</p>
      </div>
      <p class="agent-chat__realtime-terminal" data-agent-realtime-terminal hidden></p>
    </div>
  </section>

  <nav class="agent-chat__sessions" aria-label="对话列表">
    <div data-agent-session-tabs></div>
    <button type="button" data-agent-session-new title="新建对话">＋ 新对话</button>
    <span class="agent-chat__status" data-agent-status>待命</span>
  </nav>

  <section class="agent-chat__monitoring" data-agent-monitoring hidden aria-live="polite">
    <div class="agent-chat__monitoring-head">
      <strong>实时监控状态</strong>
      <button type="button" data-agent-monitoring-stop hidden>停止监控</button>
    </div>
    <div class="agent-chat__monitoring-grid">
      <span>连接</span><strong data-agent-monitoring-connection>未监控</strong>
      <span>当前片段</span><strong data-agent-monitoring-segment>—</strong>
      <span>检测进度</span><strong data-agent-monitoring-progress>—</strong>
      <span>最新报警</span><strong data-agent-monitoring-alarm>—</strong>
      <span>停止原因</span><strong data-agent-monitoring-reason>—</strong>
    </div>
    <div class="agent-chat__monitoring-progress" aria-hidden="true">
      <span data-agent-monitoring-progress-bar></span>
    </div>
  </section>

  <div class="agent-chat__messages" data-agent-messages aria-live="polite">
    <article class="agent-chat__message agent-chat__message--assistant" aria-label="智能体消息">
      <p>我已待命。你可以上传现场图片或视频，也可以直接查询风险、报告和历史记录。</p>
    </article>
  </div>

  <form class="agent-chat__composer" data-agent-form>
    <label class="agent-chat__attachment" title="选择待检测图片或视频">
      <input type="file" name="media" accept="image/*,video/*,.avi,.mkv,.flv,.wmv,.mpeg,.mpg">
      <span aria-hidden="true">＋</span>
      <span class="agent-chat__attachment-label">附件</span>
    </label>
    <label class="agent-chat__input-wrap">
      <span class="sr-only">聊天消息</span>
      <textarea
        name="message"
        rows="1"
        placeholder="输入指令，或直接发送待检测图片/视频"
        autocomplete="off"
      ></textarea>
    </label>
    <button class="agent-chat__send" type="submit">发送</button>
  </form>
  <p class="agent-chat__file" data-agent-file></p>
</section>
